<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- ローディング -->
    <div id="loading-view" class="loading-overlay">
      <span class="loading"></span>
    </div>

    <!-- セットアップ: トークン入力 -->
    <div id="token-view" class="hidden">
      <h1>🌡️ エアコン操作</h1>
      <div class="setup-section">
        <div class="input-group">
          <label>Nature Remo アクセストークン</label>
          <input type="password" id="token-input" placeholder="トークンを入力">
        </div>
        <div id="token-error" class="error-message hidden"></div>
        <button class="btn-primary" id="btn-connect">接続</button>
        <a class="help-link" href="https://home.nature.global/" target="_blank" rel="noopener noreferrer">トークンの取得はこちら →</a>
      </div>
    </div>

    <!-- セットアップ: デバイス選択 -->
    <div id="device-select-view" class="hidden">
      <h1>🌡️ エアコンを選択</h1>
      <div id="device-list" class="device-list"></div>
      <button class="btn-primary" id="btn-save-devices" disabled>選択したエアコンを保存</button>
      <button class="btn-secondary" id="btn-back-to-token">← トークン設定に戻る</button>
    </div>

    <!-- メイン操作画面 -->
    <div id="main-view" class="hidden">
      <h1>🌡️ エアコン操作</h1>
      <div id="ac-list"></div>
      <div class="all-off-section">
        <button class="btn-all-off" id="btn-all-off">🔌 すべてOFF</button>
      </div>
      <div class="settings-link" id="btn-settings">⚙️ 設定を変更</div>
    </div>

    <!-- 詳細設定画面 -->
    <div id="detail-view" class="hidden">
      <h1 id="detail-title">🌡️ 詳細設定</h1>

      <div class="setup-section">
        <div class="input-group">
          <label>運転モード</label>
          <div class="mode-buttons" id="detail-mode-buttons"></div>
        </div>

        <div class="input-group">
          <label>温度</label>
          <div class="temp-stepper" id="detail-temp-stepper">
            <button type="button" class="temp-stepper-btn" id="temp-down">−</button>
            <div class="temp-display" id="temp-display">
              <span id="temp-value">--</span><span class="temp-unit" id="temp-unit">°C</span>
            </div>
            <button type="button" class="temp-stepper-btn" id="temp-up">+</button>
          </div>
        </div>

        <div id="detail-error" class="error-message hidden"></div>

        <button class="btn-primary" id="btn-apply-detail">適用</button>
        <button class="btn-secondary" id="btn-back-to-main">← 戻る</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
