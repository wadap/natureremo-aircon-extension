name: Build extension zip

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(jq -r .version manifest.json)
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build extension zip
        run: |
          ZIP_NAME="natureremo-aircon-extension-${GITHUB_REF_NAME}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            popup.html popup.css popup.js \
            api.js storage.js dom.js modes.js detail-temp.js \
            icons/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ github.ref_name }}
          path: ${{ env.ZIP_NAME }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --generate-notes \
            "$ZIP_NAME"
